<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" font-family="Inter,Arial,sans-serif">
  <rect width="400" height="280" fill="#1c2433"/>
  <rect x="0" y="230" width="400" height="50" fill="#1a2030"/>
  <!-- Rainy atmosphere -->
  <rect x="0" y="0" width="400" height="230" fill="#1c2433"/>
  <!-- Rain streaks -->
  <g stroke="#6b9ec4" stroke-width="0.8" opacity="0.3">
    <line x1="20" y1="0" x2="15" y2="60"/>
    <line x1="60" y1="0" x2="55" y2="70"/>
    <line x1="100" y1="0" x2="95" y2="65"/>
    <line x1="150" y1="0" x2="145" y2="75"/>
    <line x1="200" y1="0" x2="195" y2="68"/>
    <line x1="260" y1="0" x2="255" y2="72"/>
    <line x1="320" y1="0" x2="315" y2="66"/>
    <line x1="380" y1="0" x2="375" y2="70"/>
    <line x1="40" y1="70" x2="35" y2="140"/>
    <line x1="90" y1="80" x2="85" y2="155"/>
    <line x1="170" y1="75" x2="165" y2="148"/>
    <line x1="230" y1="65" x2="225" y2="140"/>
    <line x1="290" y1="72" x2="285" y2="145"/>
    <line x1="350" y1="68" x2="345" y2="142"/>
  </g>
  <!-- Road (wet) -->
  <rect x="0" y="165" width="400" height="65" fill="#1a2535"/>
  <!-- Road reflections -->
  <rect x="165" y="172" width="70" height="4" rx="2" fill="#3a4a60" opacity="0.7"/>
  <rect x="165" y="185" width="70" height="4" rx="2" fill="#3a4a60" opacity="0.7"/>
  <!-- Truck -->
  <rect x="30" y="140" width="180" height="75" rx="5" fill="#1e2d42"/>
  <rect x="30" y="115" width="100" height="55" rx="4" fill="#1e2d42"/>
  <rect x="28" y="113" width="104" height="59" rx="3" fill="none" stroke="#fb923c" stroke-width="2.5"/>
  <rect x="28" y="138" width="184" height="79" rx="4" fill="none" stroke="#22c55e" stroke-width="2.5"/>
  <!-- Labels -->
  <rect x="28" y="98" width="66" height="18" rx="3" fill="#fb923c"/>
  <text x="61" y="111" fill="white" font-size="11" font-weight="700" text-anchor="middle">Cab 97%</text>
  <rect x="28" y="124" width="72" height="18" rx="3" fill="#22c55e"/>
  <text x="64" y="137" fill="white" font-size="11" font-weight="700" text-anchor="middle">Truck 99%</text>
  <!-- Small car far -->
  <rect x="300" y="175" width="75" height="40" rx="3" fill="#263345"/>
  <rect x="298" y="173" width="79" height="44" rx="2" fill="none" stroke="#22c55e" stroke-width="2"/>
  <rect x="298" y="161" width="60" height="15" rx="2" fill="#22c55e"/>
  <text x="328" y="173" fill="white" font-size="10" font-weight="700" text-anchor="middle">Car 87%</text>
  <!-- Stats -->
  <text x="200" y="253" fill="#fb923c" font-size="13" font-weight="700" text-anchor="middle">2 objects · 64 FPS · 16ms</text>
  <text x="200" y="270" fill="#94a3b8" font-size="10" text-anchor="middle">KITTI — rainy / adverse weather</text>
</svg>
